name: Release Pipeline

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-relay:
    name: Build Relay Production Package
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile packages and service
        run: npm run build

      - name: Create deploy-ready bundle
        run: |
          tar -czf crossbridge-relay.tar.gz \
            --exclude='node_modules' \
            --exclude='apps' \
            --exclude='**/*.ts' \
            --exclude='**/*.tsx' \
            --exclude='**/test' \
            --exclude='**/tests' \
            --exclude='.git' \
            --exclude='.github' \
            package.json package-lock.json services/relay packages

      - name: Upload Relay bundle
        uses: actions/upload-artifact@v4
        with:
          name: crossbridge-relay
          path: crossbridge-relay.tar.gz

  build-windows:
    name: Build Windows Tauri App (MSI/NSIS)
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install dependencies
        run: npm ci

      - name: Compile workspaces
        run: npm run build

      - name: Prepare Windows Code Signing Cert
        shell: powershell
        run: |
          $pfxBase64 = "${{ secrets.WIN_SIGNING_PFX_BASE64 }}"
          $pfxPassword = "${{ secrets.WIN_SIGNING_PFX_PASSWORD }}"
          
          if ([string]::IsNullOrEmpty($pfxBase64)) {
            Write-Host "No Windows code signing certificate found. Skipping preparation."
            exit 0
          }
          
          Write-Host "Windows code signing certificate found. Preparing PFX file..."
          $pfxPath = Join-Path $env:TEMP "cert.pfx"
          [System.IO.File]::WriteAllBytes($pfxPath, [System.Convert]::FromBase64String($pfxBase64))
          
          # Inject variables into the environment for subsequent steps
          echo "TAURI_WIN_SIGNING_PFX_PATH=$pfxPath" >> $env:GITHUB_ENV
          echo "TAURI_WIN_SIGNING_PFX_PASSWORD=$pfxPassword" >> $env:GITHUB_ENV

      - name: Build Tauri app
        shell: cmd
        run: |
          npm run windows:package:check > build-windows.log 2>&1
          if %errorlevel% neq 0 (
            type build-windows.log
            exit /b %errorlevel%
          )

      - name: Clean up Windows Code Signing Cert
        shell: powershell
        if: always()
        run: |
          $pfxPath = "$env:TEMP\cert.pfx"
          if (Test-Path $pfxPath) {
            Write-Host "Cleaning up PFX certificate file..."
            Remove-Item -Path $pfxPath -Force
          }

      - name: Upload build log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: windows-build-log
          path: build-windows.log


      - name: Upload Windows MSI Installers
        uses: actions/upload-artifact@v4
        with:
          name: crossbridge-windows-msi
          path: |
            apps/windows/src-tauri/target/release/bundle/msi/*.msi
            apps/windows/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi

      - name: Upload Windows NSIS Installers
        uses: actions/upload-artifact@v4
        with:
          name: crossbridge-windows-nsis
          path: |
            apps/windows/src-tauri/target/release/bundle/nsis/*.exe
            apps/windows/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe

  build-android:
    name: Build Android App (APK/AAB)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;35.0.0"

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Decode Keystore (Optional)
        id: decode_keystore
        run: |
          KEYSTORE_BASE64="${{ secrets.ANDROID_KEYSTORE_BASE64 }}"
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "Android keystore found. Decoding..."
            echo "$KEYSTORE_BASE64" | base64 --decode > apps/android/app/release.keystore
            echo "keystore_created=true" >> $GITHUB_OUTPUT
          else
            echo "No Android keystore found. Building unsigned artifacts."
            echo "keystore_created=false" >> $GITHUB_OUTPUT
          fi

      - name: Build Android Release APK
        run: |
          cd apps/android
          chmod +x gradlew
          ./gradlew :app:assembleRelease
        env:
          ANDROID_KEYSTORE_FILE: ${{ steps.decode_keystore.outputs.keystore_created == 'true' && 'release.keystore' || '' }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Build Android Release AAB (App Bundle)
        run: |
          cd apps/android
          ./gradlew :app:bundleRelease
        env:
          ANDROID_KEYSTORE_FILE: ${{ steps.decode_keystore.outputs.keystore_created == 'true' && 'release.keystore' || '' }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload Android Release APK
        uses: actions/upload-artifact@v4
        with:
          name: crossbridge-android-apk
          path: apps/android/app/build/outputs/apk/release/*.apk

      - name: Upload Android Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: crossbridge-android-aab
          path: apps/android/app/build/outputs/bundle/release/*.aab
